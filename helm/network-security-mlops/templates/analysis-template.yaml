{{- if .Values.rollouts.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "network-security-mlops.fullname" . }}-success-rate
  labels:
    {{- include "network-security-mlops.labels" . | nindent 4 }}
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 60s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring:9090
          query: |
            sum(rate(
              http_requests_total{service="{{`{{args.service-name}}`}}", status=~"2.."}[5m]
            )) /
            sum(rate(
              http_requests_total{service="{{`{{args.service-name}}`}}"}[5m]
            ))
{{- end }}
