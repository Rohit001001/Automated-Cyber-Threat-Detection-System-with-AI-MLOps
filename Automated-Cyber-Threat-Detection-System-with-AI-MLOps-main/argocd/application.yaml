apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-security-mlops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: network-security-mlops
  source:
    repoURL: "https://github.com/<YOUR_GITHUB_USERNAME>/network-security-mlops.git"
    targetRevision: main
    path: helm/network-security-mlops
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: network-security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
